site_name: Lenar Materials
site_description: Practical knowledge base for Linux, SQL, Docker, Java, and more
docs_dir: docs

theme:
  name: material
  language: ru
  features:
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  # SuperFences: корректные fenced-блоки внутри admonition и других вложенных контейнеров
  - pymdownx.highlight
  - pymdownx.superfences
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

exclude_docs: |
  PROJECT_APPROACHES.md
  CONTENT_WORKFLOW.md
  LINUX_TOPICS_AUDIT.md

nav:
  - Главная: index.md
  - Linux:
      - linux/README.md
      - Topics:
          - Overview: linux/topics/README.md
          - Basics: linux/topics/basics/README.md
          - Files: linux/topics/files/README.md
          - Processes: linux/topics/processes/README.md
          - Network: linux/topics/network/README.md
          - Security: linux/topics/security/README.md
          - Troubleshooting: linux/topics/troubleshooting/README.md
      - Learning:
          - Fundamentals: linux/learning/linux-fundamentals.md
      - Tips & Tricks: linux/tips/linux-tips-and-tricks.md
      - Core Commands:
          - Обзор и справочник: linux/core-commands/README.md
          - whoami: linux/core-commands/whoami.md
          - pwd: linux/core-commands/pwd.md
          - cd: linux/core-commands/cd.md
          - hostname: linux/core-commands/hostname.md
          - ls: linux/core-commands/ls.md
          - cp: linux/core-commands/cp.md
          - mv: linux/core-commands/mv.md
          - mkdir: linux/core-commands/mkdir.md
          - rm: linux/core-commands/rm.md
          - find: linux/core-commands/find.md
          - chmod: linux/core-commands/chmod.md
          - chown: linux/core-commands/chown.md
          - stat: linux/core-commands/stat.md
          - grep: linux/core-commands/grep.md
          - tail: linux/core-commands/tail.md
          - du: linux/core-commands/du.md
          - df: linux/core-commands/df.md
          - rsync: linux/core-commands/rsync.md
          - pgrep: linux/core-commands/pgrep.md
          - ps: linux/core-commands/ps.md
          - kill: linux/core-commands/kill.md
          - pkill: linux/core-commands/pkill.md
          - systemctl: linux/core-commands/systemctl.md
          - journalctl: linux/core-commands/journalctl.md
          - sudo: linux/core-commands/sudo.md
          - dig: linux/core-commands/dig.md
          - ping: linux/core-commands/ping.md
          - nc: linux/core-commands/nc.md
          - curl: linux/core-commands/curl.md
          - ip: linux/core-commands/ip.md
          - ss: linux/core-commands/ss.md
          - free: linux/core-commands/free.md
          - dmesg: linux/core-commands/dmesg.md
      - Recipes:
          - Обзор: linux/recipes/README.md
          - Сервис не запускается: linux/recipes/service-wont-start.md
          - Нехватка места на диске: linux/recipes/disk-space-low.md
          - Безопасная чистка старых логов: linux/recipes/safe-old-logs-cleanup.md
          - Тяжёлый процесс (CPU/память): linux/recipes/heavy-process-resources.md
          - Сервис недоступен по сети: linux/recipes/service-unreachable-network.md
          - Обновления безопасности (один хост): linux/recipes/security-updates-single-host.md
          - TLS Let's Encrypt (выдача): linux/recipes/letsencrypt-certificate.md
